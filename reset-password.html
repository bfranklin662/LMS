<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset password</title>
  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #f6f7fb;
      margin: 0;
      padding: 24px;
    }
    .card {
      max-width: 420px;
      margin: 40px auto;
      background: #fff;
      border: 1px solid #e8e8ef;
      border-radius: 14px;
      padding: 20px;
    }
    h1 {
      margin-top: 0;
      font-size: 22px;
    }
    label {
      display: block;
      margin-bottom: 12px;
    }
    input {
      width: 100%;
      box-sizing: border-box;
      padding: 10px 12px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      margin-top: 6px;
    }
    button {
      padding: 10px 14px;
      border: 0;
      border-radius: 8px;
      background: #0b1b3a;
      color: #fff;
      cursor: pointer;
    }
    .msg {
      margin-top: 12px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Reset password</h1>

    <form id="resetPasswordForm">
      <label>
        New password
        <input type="password" id="newPassword" required minlength="6" />
      </label>

      <label>
        Confirm new password
        <input type="password" id="confirmPassword" required minlength="6" />
      </label>

      <button type="submit" id="resetPasswordBtn">Save new password</button>
      <div id="msg" class="msg"></div>
    </form>
  </div>

  <script>
    const API_URL = "https://lms-api.nick-horne123.workers.dev";

    async function api(payload) {
      const res = await fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify(payload),
        mode: "cors"
      });

      const text = await res.text();
      const data = JSON.parse(text);

      if (!data.ok) throw new Error(data.error || "API error");
      return data;
    }

    function getToken() {
      const url = new URL(window.location.href);
      return url.searchParams.get("token") || "";
    }

    document.getElementById("resetPasswordForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const msg = document.getElementById("msg");
      const btn = document.getElementById("resetPasswordBtn");

      const token = getToken();
      const newPassword = document.getElementById("newPassword").value;
      const confirmPassword = document.getElementById("confirmPassword").value;

      msg.textContent = "";

      if (!token) {
        msg.textContent = "Invalid reset link.";
        return;
      }

      if (newPassword !== confirmPassword) {
        msg.textContent = "Passwords do not match.";
        return;
      }

      btn.disabled = true;

      try {
        await api({
          action: "resetPassword",
          token,
          newPassword
        });

        msg.textContent = "Password reset successful. You can now return to the login page.";
      } catch (err) {
        msg.textContent = String(err.message || err);
      } finally {
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
