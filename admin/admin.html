<!doctype html>
<html>

<head>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>LMS Admin</title>
  <link rel="stylesheet" href="../styles.css">
  <link rel="icon" href="../site/images/lmsSquare5.jpg">
  <!-- Social sharing (WhatsApp / Facebook / iMessage etc) -->
  <meta property="og:title" content="Polytechnic FC – Last Man Standing" />
  <meta property="og:description"
    content="Join the Polytechnic FC Last Man Standing competition. Pick one team each week – last player standing wins the prize pot." />
  <meta property="og:image" content="https://i.ibb.co/F4F5HzN1/lms-Meta2.jpg" />
  <meta property="og:url" content="https://polytechniclms.com/" />
  <meta property="og:type" content="website" />

</head>

<body>
  <!-- SPLASH -->
  <div id="splash" class="splash hidden">
    <div class="splash-inner">
      <img class="splash-logo" src="../site/images/lmsSquare5.jpg" alt="Polytechnic FC" />
      <div class="splash-title">LMS Admin</div>
      <div class="splash-sub">Polytechnic FC</div>
      <div class="splash-ball" aria-label="Loading">⚽</div>
    </div>
  </div>

  <div class="app">
    <header class="topbar">
      <div class="brand auth-brand">
        <img class="brand-logo" src="../site/images/lmsSquare5.jpg" alt="Polytechnic FC" />
        <div class="brand-text">
          <div class="brand-title">LMS Admin</div>
          <div class="brand-sub">Polytechnic FC</div>
        </div>
      </div>

      <div class="top-actions">
        <button id="adminLogoutBtn" class="btn btn-ghost hidden" type="button">Log out</button>
      </div>
    </header>

    <hr class="auth-divider">



    <main class="view">
      <div class="card admin-card">

        <!-- LOGIN VIEW -->
        <section id="loginView">
          <h3 style="margin-top:0">Admin login</h3>
          <label>

            <input class="admin-key" id="adminKey" type="password" autocomplete="current-password"
              placeholder="Admin password" />
          </label>
          <button class="btn btn-primary" id="adminLoginBtn" type="button">Log in</button>
        </section>

        <!-- PANEL VIEW -->
        <section id="panelView" class="hidden">

          <div class="fixtures-card" style="margin-bottom:12px;">
            <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;">
              <div>
                <div style="font-weight:900;">Selected game</div>
              </div>

              <div style="min-width:220px;flex:1;max-width:320px;">
                <select id="adminGameSelect" class="input" style="width:100%;">
                  <option value="">Loading games…</option>
                </select>
              </div>
            </div>
          </div>

          <div class="seg-tabs">
            <button class="tab2 active" data-tab="approvals" type="button">Approvals</button>
            <button class="tab2" data-tab="submissions" type="button">Submissions</button>
            <button class="tab2" data-tab="fixtures" type="button">Fixtures</button>
          </div>

          <div id="adminMsg" class="msg hidden" style="margin-top:12px;"></div>

          <!-- APPROVALS -->
          <section id="panel-approvals">
            <div style="display:flex;align-items:center;justify-content:space-between;margin:10px 0 14px;">
              <div id="pendingMeta" class="muted small"></div>
              <button class="btn btn-primary" id="refreshApprovalsBtn" type="button">Refresh</button>
            </div>

            <details class="fixtures-card collapse-card" open style="margin-bottom:12px;">
              <summary class="collapse-summary">
                <h3 style="margin:0">Pending <span id="pendingCount" class="muted small"></span></h3>
                <span class="caret">▸</span>
              </summary>

              <div style="margin-top:10px;">
                <div id="pendingList" class="list"></div>
              </div>
            </details>


            <details class="fixtures-card collapse-card" open>
              <summary class="collapse-summary">
                <h3 style="margin:0">Approved <span id="approvedCount" class="muted small"></span></h3>
                <span class="caret">▸</span>
              </summary>

              <div style="margin-top:10px;">
                <div id="approvedList" class="list"></div>
              </div>
            </details>
          </section>

          <!-- SUBMISSIONS -->
          <section id="panel-submissions" class="hidden">
            <div id="automationStatusCard" class="fixtures-card" style="margin-bottom:12px;">
              <h3 style="margin-top:0;">Automation status</h3>
              <div id="automationStatusBody" class="muted">Loading automation status…</div>
            </div>
            <div style="display:flex;align-items:center;justify-content:space-between;margin:10px 0 14px;">
              <div id="subsMeta" class="muted small"></div>
              <button class="btn btn-primary" id="refreshSubsBtn" type="button">Refresh</button>
            </div>

            <div style="display:flex;gap:12px;align-items:center;margin-bottom:12px;" class="muted small">
            </div>

            <div id="subsContainer"></div>
          </section>

          <!-- FIXTURES PANEL -->
          <section id="panel-fixtures" class="hidden">
            <div class="fixtures-card" style="margin-bottom:16px;">
              <div id="fixturesMeta" class="muted small" style="margin-bottom:12px;"></div>

              <div class="filters" style="margin-bottom:12px;">
                <select id="adminFixtureGwSelect" class="filter select-dropdown"></select>
              </div>

              <div style="display:flex;gap:8px;margin-bottom:12px;">
                <input id="fixtureScanFromDate" class="input fixture-date-input" type="date">
                <input id="fixtureScanToDate" class="input fixture-date-input" type="date">
              </div>
              <div class="muted small" style="margin-top:10px;line-height:1.7;">
                <div>First submission deadline: <span id="fixtureFirstDeadlineText">—</span></div>
                <div>Late submission deadline: <span id="fixtureLateDeadlineText">—</span></div>
              </div>

              <button id="refreshFixturesBtn" class="btn btn-primary" type="button">Rescan fixtures</button>
              <button id="updateResultsBtn" class="btn btn-ghost" type="button">Update results</button>

              <div id="fixtureScanStatusWrap" class="hidden" style="margin-top:10px;">
                <div id="fixtureScanStatusText" class="muted small" style="min-height:20px;"></div>
                <div class="fixture-scan-bar-track">
                  <div id="fixtureScanBar" class="fixture-scan-bar-fill"></div>
                </div>
              </div>
            </div>

            <div id="adminFixturesList"></div>

            <div id="fixtureChangesSummary"></div>

            <div style="margin-top:18px;display:flex;justify-content:flex-end;">
              <button id="commitFixturesBtn" class="btn btn-primary" type="button" disabled>Commit changes</button>
            </div>
          </section>

        </section>
      </div>
    </main>
  </div>

  <!-- BULK RESOLVE MODAL -->
  <div id="bulkResolveModal" class="modal hidden" aria-hidden="true">
    <div class="modal-card">
      <h3 id="bulkResolveModalTitle" style="margin-top:0;">Confirm</h3>
      <div id="bulkResolveModalBody" class="muted" style="margin-top:10px;"></div>

      <div style="display:flex;justify-content:flex-end;gap:10px;margin-top:18px;">
        <button id="bulkResolveCancelBtn" class="btn btn-ghost" type="button">Cancel</button>
        <button id="bulkResolveConfirmBtn" class="btn btn-primary" type="button">Confirm</button>
      </div>
    </div>
  </div>

  <script src="admin.js"></script>
</body>


</html>
