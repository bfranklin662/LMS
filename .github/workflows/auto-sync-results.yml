name: Auto Sync Results

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-results:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install playwright dotenv

      - name: Install Chromium
        run: npx playwright install chromium

      - name: Check Playwright installed
        run: node -e "console.log(require.resolve('playwright'))"

      - name: Run auto sync
        run: node tools/auto-sync-results.js
        env:
          LMS_ADMIN_KEY: ${{ secrets.LMS_ADMIN_KEY }}

      - name: Update automation status file
        run: |
          NOW=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          cat > site/data/automation-status.json <<EOF
          {
            "lastRunIso": "$NOW",
            "lastSyncIso": "$NOW",
            "lastResolveIso": "$NOW",
            "status": "ok"
          }
          EOF

      - name: Commit changes if needed
        run: |
          git pull --rebase origin main

          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add site/data/fixtures/*.json site/data/automation-status.json
          git add site/data/auto-resolve-report.json 2>/dev/null || true
          git commit -m "Auto-sync fixture results"

          git pull --rebase origin main
          git push
