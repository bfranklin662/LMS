name: Auto Sync Results

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-results:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Create package.json
        run: npm init -y

      - name: Install Playwright
        run: npm install playwright

      - name: Install Chromium
        run: npx playwright install chromium

      - name: Check Playwright installed
        run: node -e "console.log(require.resolve('playwright'))"

      - name: Run auto sync
        run: node tools/auto-sync-results.js

      - name: Check admin secret exists
        run: |
          if [ -z "$LMS_ADMIN_KEY" ]; then
            echo "LMS_ADMIN_KEY is missing"
            exit 1
          else
            echo "LMS_ADMIN_KEY is present"
          fi
        env:
          LMS_ADMIN_KEY: ${{ secrets.LMS_ADMIN_KEY }}

      - name: Run auto resolve picks
        run: node tools/auto-resolve-picks.js --apply
        env:
          LMS_ADMIN_KEY: ${{ secrets.LMS_ADMIN_KEY }}

      - name: Commit changes if needed
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add site/data/fixtures/*.json
          git commit -m "Auto-sync fixture results"
          git push